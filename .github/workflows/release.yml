name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 2.1.0)'
        required: true
        default: '2.1.0'

jobs:
  release:
    name: Build and Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.os == 'windows-latest' && 'x86_64-pc-windows-msvc' || 'x86_64-apple-darwin,aarch64-apple-darwin' }}

      - name: Install Dependencies
        run: npm ci

      - name: Build Native Audio Module
        run: npm run build:native

      - name: Download macOS Whisper Binaries (macOS only)
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets/whisper-bin
          echo "Fetching pre-compiled macOS binaries to prevent CI compilation timeouts..."
          
          # Download official release binaries instead of building from scratch
          curl -L "https://github.com/ggerganov/whisper.cpp/releases/latest/download/whisper-bin-*-macos-*.zip" -o whisper.zip || \
          curl -L "https://github.com/ggerganov/whisper.cpp/releases/download/v1.7.0/whisper-bin-arm64-macos-14.7.zip" -o whisper.zip
          
          unzip -xj whisper.zip "*/main" "*/server" -d assets/whisper-bin/ || echo "Zip extraction fallback"
          
          # Rename to match our platform expectations
          if [ -f "assets/whisper-bin/main" ]; then mv assets/whisper-bin/main assets/whisper-bin/whisper-cli; fi
          if [ -f "assets/whisper-bin/server" ]; then mv assets/whisper-bin/server assets/whisper-bin/whisper-server; fi
          
          chmod +x assets/whisper-bin/*

      - name: Build and Publish Electron App
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_SKIP_SIGNING: true
        run: npm run dist -- -c.extraMetadata.version=${{ github.event.inputs.version }}
